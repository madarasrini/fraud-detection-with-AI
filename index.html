
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale-1.0" />
    <title>Agentic Honey-Pot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      #background-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background-color: #0a0f1f;
      }
      #root {
        position: relative;
        z-index: 1;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fadeIn {
        animation: fadeIn 0.3s ease-out forwards;
      }
      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 8px rgba(59, 130, 246, 0.5); }
        50% { box-shadow: 0 0 16px rgba(59, 130, 246, 0.8); }
      }
      .animate-pulse-glow {
        animation: pulse-glow 2s infinite ease-in-out;
      }
      @keyframes score-pop {
        0% { transform: scale(1); text-shadow: none; }
        50% { transform: scale(1.15); text-shadow: 0 0 10px currentColor; }
        100% { transform: scale(1); text-shadow: none; }
      }
      .animate-score-pop {
        animation: score-pop 0.3s ease-in-out;
      }
      @keyframes ripple-effect {
        from {
          r: 52; /* Start from the gauge radius */
          opacity: 0.7;
        }
        to {
          r: 64; /* Expand outwards */
          opacity: 0;
        }
      }
      .animate-ripple {
        stroke-width: 3;
        animation: ripple-effect 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0"
  }
}
</script>
</head>
  <body class="text-gray-100">
    <canvas id="background-canvas"></canvas>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
